name: Release

# 手动触发 workflow，支持选择组件和版本号
on:
  workflow_dispatch:
    inputs:
      component:
        description: "要发布的组件"
        required: true
        type: choice
        options:
          - server
          - agent-core
          - client-app
        default: server
      version:
        description: "发布版本号（SemVer，例如 0.1.1）"
        required: true
        type: string

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Prepare Job
  #   - 校验版本号格式
  #   - 设置二进制文件名和 tag 名称
  #   - 从 CHANGELOG.md 生成 release notes
  #   - 版本号由用户手动管理（提前 push main）
  # --------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}
      binary_name: ${{ steps.set-binary.outputs.binary_name }}
      component: ${{ github.event.inputs.component }}
      version: ${{ github.event.inputs.version }}
      body: ${{ steps.changelog.outputs.body }}
    env:
      COMPONENT: ${{ github.event.inputs.component }}
      VERSION: ${{ github.event.inputs.version }}
    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 校验 version 参数是否符合 SemVer（简单正则：x.y.z，x/y/z 为非负整数）
      - name: Validate SemVer
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "   Expected SemVer format like 0.1.1"
            exit 1
          fi
          echo "✅ Version format valid: $VERSION"

      # 根据组件设置二进制文件名（用于后续产物命名）
      - name: Set binary name
        id: set-binary
        run: |
          set -euo pipefail
          if [[ "$COMPONENT" == "server" ]]; then
            echo "binary_name=open-aaas-server" >> "$GITHUB_OUTPUT"
          elif [[ "$COMPONENT" == "agent-core" ]]; then
            echo "binary_name=agent-core" >> "$GITHUB_OUTPUT"
          elif [[ "$COMPONENT" == "client-app" ]]; then
            echo "binary_name=openaaas-client" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown component: $COMPONENT"
            exit 1
          fi

      # 设置 tag 名称（供后续 job 使用，此处不推送 tag）
      - name: Set tag name
        id: set-tag
        run: |
          set -euo pipefail
          TAG="${COMPONENT}-v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"

      # 从 CHANGELOG.md 读取对应版本的变更内容
      - name: Generate release notes
        id: changelog
        run: |
          set -euo pipefail

          CHANGELOG_PATH="${COMPONENT}/CHANGELOG.md"

          if [[ ! -f "$CHANGELOG_PATH" ]]; then
            echo "❌ CHANGELOG.md not found at $CHANGELOG_PATH"
            exit 1
          fi

          BODY=$(python3 << 'PYEOF'
          import os
          import re
          import sys

          component = os.environ["COMPONENT"]
          version = os.environ["VERSION"]
          changelog_path = f"{component}/CHANGELOG.md"

          if not os.path.exists(changelog_path):
              print(f"❌ CHANGELOG.md not found at {changelog_path}", file=sys.stderr)
              sys.exit(1)

          with open(changelog_path, "r", encoding="utf-8") as f:
              content = f.read()

          pattern = rf"^## \[{re.escape(version)}\][^\n]*$"
          match = re.search(pattern, content, re.MULTILINE)
          if not match:
              print(f"❌ Version {version} not found in {changelog_path}", file=sys.stderr)
              sys.exit(1)

          start = match.end()
          next_match = re.search(r"^## \[", content[start:], re.MULTILINE)
          if next_match:
              end = start + next_match.start()
          else:
              end = len(content)

          body = content[start:end].strip()
          print(body)
          PYEOF
          )

          # 多行输出写入 GITHUB_OUTPUT
          {
            printf '%s\n' 'body<<CHANGELOG_EOF'
            printf '%s\n' "$BODY"
            printf '%s\n' 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------------
  # Build Job
  #   - 在 4 个目标平台上执行矩阵构建
  #   - 每个平台先测试，再编译 release 二进制文件并打包
  # --------------------------------------------------------------------------
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            os: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            os: linux
            arch: arm64
          - runner: macos-latest
            target: aarch64-apple-darwin
            os: macos
            arch: arm64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows
            arch: x64
    runs-on: ${{ matrix.runner }}
    env:
      COMPONENT: ${{ needs.prepare.outputs.component }}
      BINARY_NAME: ${{ needs.prepare.outputs.binary_name }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check platform support
        id: support
        shell: bash
        run: |
          if [[ "${{ env.COMPONENT }}" == "client-app" && "${{ runner.os }}" == "Linux" ]]; then
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ Skipping client-app build on Linux"
          else
            echo "supported=true" >> "$GITHUB_OUTPUT"
          fi

      # 安装 Rust stable 工具链，并安装对应目标平台
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 为 Tauri (Linux) 安装系统依赖
      - name: Install Tauri dependencies (Linux)
        if: env.COMPONENT == 'client-app' && runner.os == 'Linux' && steps.support.outputs.supported == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-1 librsvg2-dev libgtk-3-dev pkg-config

      # 为 Linux musl 目标安装 musl-tools（提供 musl-gcc 等工具）
      - name: Install musl tools
        if: env.COMPONENT != 'client-app' && contains(matrix.target, '-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # 缓存 Rust 构建产物，减少矩阵编译时间
      - name: Cache Rust build
        if: env.COMPONENT != 'client-app'
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Cache Rust build (client-app)
        if: env.COMPONENT == 'client-app' && steps.support.outputs.supported == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.target }}
          workspaces: client-app/src-tauri

      - name: Setup Node.js
        if: env.COMPONENT == 'client-app' && steps.support.outputs.supported == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-app/package-lock.json

      # 先执行测试，阻断有 bug 的版本直接发布。
      # 注意：当前矩阵仅限于原生构建（runner 架构与 target 一一对应）；
      # Linux 使用 musl 目标以生成静态链接二进制，可在任意 Linux 发行版运行。
      # 若未来加入交叉编译目标，此测试步骤需要调整。
      - name: Run tests
        if: steps.support.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${COMPONENT}" == "client-app" ]]; then
            cd client-app
            npm ci
            npm run test
            cd src-tauri
            cargo test
            cd ..
            npm run build
          else
            cd "${COMPONENT}"
            if [ "${COMPONENT}" = "agent-core" ]; then
              cargo test --features test-utils --target ${{ matrix.target }}
            else
              cargo test --target ${{ matrix.target }}
            fi
          fi

      # 仅在 Linux x86_64 上生成覆盖率报告，避免矩阵重复
      - name: Generate coverage report
        if: matrix.os == 'linux' && matrix.arch == 'x64' && env.COMPONENT != 'client-app' && steps.support.outputs.supported == 'true'
        run: |
          cd "${COMPONENT}"
          cargo install cargo-tarpaulin --locked
          if [ "${COMPONENT}" = "agent-core" ]; then
            cargo tarpaulin --features test-utils --out Xml
          else
            cargo tarpaulin --out Xml
          fi

      # 在对应组件目录下执行 release 构建
      - name: Build release binary
        if: env.COMPONENT != 'client-app' && steps.support.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "${COMPONENT}"
          cargo build --release --target ${{ matrix.target }}

      - name: Build Tauri app (Windows)
        if: env.COMPONENT == 'client-app' && runner.os == 'Windows' && steps.support.outputs.supported == 'true'
        shell: pwsh
        run: |
          cd client-app
          npm run tauri:build

      - name: Build Tauri app (Unix)
        if: env.COMPONENT == 'client-app' && runner.os != 'Windows' && steps.support.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd client-app
          npm run tauri:build

      # 创建临时目录，复制二进制文件 + README + LICENSE
      # 同时计算出产物包名和扩展名信息
      - name: Prepare staging directory
        id: staging
        if: steps.support.outputs.supported == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BINARY_NAME="${{ env.BINARY_NAME }}"
          VERSION="${{ env.VERSION }}"
          OS="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"
          PACKAGE_NAME="${BINARY_NAME}-${VERSION}-${OS}-${ARCH}"

          mkdir -p "${PACKAGE_NAME}"

          if [[ "${{ env.COMPONENT }}" == "client-app" ]]; then
            BUNDLE_DIR="client-app/src-tauri/target/release/bundle"
            if [[ "${{ runner.os }}" == "macOS" ]]; then
              # 查找 dmg 和 app（处理 productName 中的空格）
              find "${BUNDLE_DIR}/dmg" -name "*.dmg" -exec cp {} "${PACKAGE_NAME}/" \; 2>/dev/null || true
              find "${BUNDLE_DIR}/macos" -maxdepth 1 -name "*.app" -type d -exec cp -R {} "${PACKAGE_NAME}/" \; 2>/dev/null || true
              printf '%s\n' "archive=${PACKAGE_NAME}.tar.gz" >> "$GITHUB_OUTPUT"
              printf '%s\n' "checksum=${PACKAGE_NAME}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
            elif [[ "${{ runner.os }}" == "Windows" ]]; then
              # 查找 msi 和 exe（处理 productName 中的空格）
              find "${BUNDLE_DIR}/msi" -name "*.msi" -exec cp {} "${PACKAGE_NAME}/" \; 2>/dev/null || true
              find "${BUNDLE_DIR}/nsis" -name "*.exe" -exec cp {} "${PACKAGE_NAME}/" \; 2>/dev/null || true
              printf '%s\n' "archive=${PACKAGE_NAME}.zip" >> "$GITHUB_OUTPUT"
              printf '%s\n' "checksum=${PACKAGE_NAME}.zip.sha256" >> "$GITHUB_OUTPUT"
            else
              # 查找 deb（处理 productName 中的空格）
              find "${BUNDLE_DIR}/deb" -name "*.deb" -exec cp {} "${PACKAGE_NAME}/" \; 2>/dev/null || true
              printf '%s\n' "archive=${PACKAGE_NAME}.tar.gz" >> "$GITHUB_OUTPUT"
              printf '%s\n' "checksum=${PACKAGE_NAME}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
            fi
          else
            # Windows 二进制文件带 .exe 后缀
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              BINARY_EXT=".exe"
            else
              BINARY_EXT=""
            fi

            # 复制产物
            cp "${COMPONENT}/target/${{ matrix.target }}/release/${BINARY_NAME}${BINARY_EXT}" "${PACKAGE_NAME}/"
            cp "${COMPONENT}/README.md" "${PACKAGE_NAME}/"
            cp LICENSE "${PACKAGE_NAME}/"

            # 根据操作系统决定打包格式
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              printf '%s\n' "archive=${PACKAGE_NAME}.zip" >> "$GITHUB_OUTPUT"
              printf '%s\n' "checksum=${PACKAGE_NAME}.zip.sha256" >> "$GITHUB_OUTPUT"
            else
              printf '%s\n' "archive=${PACKAGE_NAME}.tar.gz" >> "$GITHUB_OUTPUT"
              printf '%s\n' "checksum=${PACKAGE_NAME}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
            fi
          fi

          printf '%s\n' "package_name=${PACKAGE_NAME}" >> "$GITHUB_ENV"
          printf '%s\n' "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

      # Linux / macOS：使用 tar 打包并生成 sha256 校验文件
      - name: Pack artifact (Linux/macOS)
        if: runner.os != 'Windows' && steps.support.outputs.supported == 'true'
        run: |
          set -euo pipefail
          tar czf "${{ env.package_name }}.tar.gz" "${{ env.package_name }}"
          sha256sum "${{ env.package_name }}.tar.gz" > "${{ env.package_name }}.tar.gz.sha256"

      # Windows：使用 PowerShell Compress-Archive 打包并生成 sha256 校验文件
      # 输出格式与 Linux/macOS 统一: "<hash>  <filename>"
      - name: Pack artifact (Windows)
        if: runner.os == 'Windows' && steps.support.outputs.supported == 'true'
        shell: pwsh
        run: |
          $packageName = "${{ env.package_name }}".Trim()
          $items = Get-ChildItem -Path "$packageName" -ErrorAction SilentlyContinue
          if ($items.Count -eq 0) {
            Write-Error "No artifacts found in $packageName"
            exit 1
          }
          Compress-Archive -Path "$packageName" -DestinationPath "$packageName.zip"
          $hash = Get-FileHash "$packageName.zip" -Algorithm SHA256
          $filename = "$packageName.zip"
          "$($hash.Hash)  $filename" | Out-File -FilePath "$packageName.zip.sha256" -Encoding ASCII

      # 上传构建产物到 artifact storage，供 release job 下载
      - name: Upload artifact
        if: steps.support.outputs.supported == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ${{ steps.staging.outputs.archive }}
            ${{ steps.staging.outputs.checksum }}
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Tag Job
  #   - build 成功后打 tag 并推送
  #   - build 失败则不会执行，避免产生 orphan tag
  # --------------------------------------------------------------------------
  tag:
    needs: [build, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check remote tag exists
        run: |
          set -euo pipefail
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}"; then
            echo "❌ Tag ${TAG} already exists on remote. Aborting to avoid overwriting existing release."
            exit 1
          fi

      - name: Create and push tag
        run: |
          set -euo pipefail
          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Created and pushed tag: ${TAG}"

  # --------------------------------------------------------------------------
  # Release Job
  #   - 下载所有平台的构建产物
  #   - 创建 GitHub Release 并上传所有资产
  # --------------------------------------------------------------------------
  release:
    needs: [tag, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 下载所有构建产物（merge-multiple 会把各 artifact 的文件放到同一目录）
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # 确认产物已就位
      - name: List artifacts
        run: |
          set -euo pipefail
          ls -la artifacts/

      # 创建 GitHub Release，并上传所有打包文件和校验文件
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "${{ needs.prepare.outputs.component }} v${{ needs.prepare.outputs.version }}"
          body: ${{ needs.prepare.outputs.body }}
          files: artifacts/*
