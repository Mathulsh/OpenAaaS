name: Feature Request
description: 为 OpenAaaS 提出新功能建议
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]

body:
  - type: checkboxes
    id: pre-check
    attributes:
      label: 前置检查
      description: 在提交之前，请确认以下事项
      options:
        - label: 我已搜索现有 issue，确认该功能未被请求过
          required: true
        - label: 我正在使用最新版本的 OpenAaaS
          required: false

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 请描述你遇到的问题或痛点。该功能想要解决什么问题？
      placeholder: |
        当前在使用 OpenAaaS 时，我遇到了一个不方便的地方：...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 请描述你希望实现的功能，以及你希望它如何工作
      placeholder: |
        我希望 OpenAaaS 能够支持：...
        具体行为如下：...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案考虑
      description: 你是否考虑过其他替代方案？请描述
      placeholder: |
        我考虑过以下替代方案，但都有各自的局限：
        - ...
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 功能范围
      description: 请选择该功能主要涉及的范围
      options:
        - Server API
        - Agent Core
        - Client SDK
        - Desktop App
        - MCP & Plugin
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他相关的上下文、参考链接或设计思路
    validations:
      required: false
