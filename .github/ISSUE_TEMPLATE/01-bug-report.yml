name: Bug Report
description: 报告 OpenAaaS 的 Bug
title: "[Bug]: "
labels: ["bug", "needs-triage"]

body:
  - type: checkboxes
    id: pre-check
    attributes:
      label: 前置检查
      description: 在提交之前，请确认以下事项
      options:
        - label: 我已搜索现有 issue，确认该问题未被报告过
          required: true
        - label: 我正在使用最新版本的 OpenAaaS
          required: true

  - type: dropdown
    id: component
    attributes:
      label: 受影响组件
      description: 请选择问题发生的组件
      options:
        - Server
        - Agent Core
        - Client App
        - Client Extension
        - Dash
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本号 / Commit
      description: 请填写受影响的版本号或 Git commit hash
      placeholder: 例如 v0.1.0 或 abc1234
    validations:
      required: true

  - type: dropdown
    id: deploy-mode
    attributes:
      label: 部署模式
      description: 请选择你当前的部署模式
      options:
        - 公共服务器 (https://api.open-aaas.com)
        - 自建 Server
        - 自建 Agent Core
        - 两者都有（自建 Server + Agent Core）
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 请清晰、简洁地描述该 Bug
      placeholder: 发生了什么？
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请提供可复现该问题的详细步骤
      placeholder: |
        1. 运行 '...'
        2. 点击 '...'
        3. 发现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 请描述你期望发生的行为
      placeholder: 应该发生什么？
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请提供操作系统、Docker 版本、Rust 版本等相关环境信息
      placeholder: |
        - OS: macOS 14.0 / Ubuntu 22.04 / Windows 11
        - Docker: 24.0.0
        - Rust: 1.78.0
        - Node: 20.0.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 请粘贴相关的错误日志或终端输出
      render: shell
      placeholder: |
        $ open-aaas-server run
        ERROR: ...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他有助于诊断该问题的信息（截图、配置等）
    validations:
      required: false
